<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>30 SONGS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f7f7f7; --text: #2a2a2a; --card: #ffffff; 
            --border: #e5e5e5; --accent: #2a2a2a; --player-bg: #ffffff;
            --btn-play: #2a2a2a; --btn-icon: #f7f7f7;
        }
        .dark-mode { 
            --bg: #161616; --text: #d1d1d1; --card: #1e1e1e; 
            --border: #2a2a2a; --accent: #d1d1d1; --player-bg: #1a1a1a;
            --btn-play: #d1d1d1; --btn-icon: #161616;
        }

        /* Cambios críticos para estabilidad en móvil */
        html, body { 
            position: fixed;
            overflow: hidden; 
            width: 100%;
            height: 100%; 
            height: -webkit-fill-available;
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            transition: background 0.4s; 
        }

        #main-scroll-container { 
            height: 100%; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding-top: 80px; 
            padding-bottom: 280px; 
        }
        #main-scroll-container::-webkit-scrollbar { display: none; }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); }

        .label-caps { font-size: 10px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; font-weight: 600; }
        
        .zen-input { 
            border: 1px solid var(--border); 
            background: transparent; 
            border-radius: 1rem; 
            outline: none; 
            color: var(--text);
            text-align: center;
            font-size: 16px; /* Importante: 16px evita el zoom automático en iPhone */
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
        }
        /* Ajustamos el placeholder para que no se vea gigante aunque el font sea 16px */
        .zen-input::placeholder { font-size: 10px; opacity: 0.3; }
        
        #resultados { position: absolute; top: 110%; left: 0; right: 0; background: var(--card); border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-height: 50vh; overflow-y: auto; border: 1px solid var(--border); display: none; z-index: 110; }

        .progress-container { width: 100%; background: var(--border); height: 2px; cursor: pointer; position: relative; margin-bottom: 4px; }
        #progress-bar { background: var(--accent); height: 100%; width: 0%; }
        .time-label { font-size: 9px; font-family: monospace; opacity: 0.5; }

        .cassette-icon { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .cassette-filled { fill: var(--accent) !important; stroke: var(--accent) !important; }
        .cassette-filled .reel { fill: var(--player-bg) !important; stroke: none !important; }
        
        #player { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100; background: var(--player-bg); border-top: 1px solid var(--border); transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding-bottom: env(safe-area-inset-bottom); }
        #player.visible { transform: translateY(0); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <span class="label-caps text-[var(--text)]">30 SONGS</span>
            <button onclick="toggleTheme()" id="theme-btn-text" class="label-caps opacity-50">DARK</button>
        </div>
        <div class="flex items-center gap-2">
            <span id="fav-count" class="label-caps font-bold text-[var(--text)]">0</span>
            <span class="label-caps">/ 30</span>
        </div>
    </nav>

    <div id="main-scroll-container">
        <main class="max-w-xl mx-auto w-full px-6">
            <div class="mb-4 relative">
                <input id="q" type="text" placeholder="MAKE A MIX" class="zen-input w-full py-4 px-7" oninput="handleSearch()" autocomplete="off">
                <div id="resultados"></div>
            </div>
            
            <div class="mb-14">
                <button onclick="zenStart()" class="w-full py-5 rounded-2xl bg-[var(--text)] text-[var(--bg)] font-bold text-[10px] tracking-[0.3em] uppercase flex items-center justify-center gap-3 active:scale-95 transition-transform">
                    START 30s MIX
                </button>
            </div>
            <div id="favs-list" class="space-y-3"></div>
        </main>
    </div>

    <footer id="player">
        <div class="p-8">
            <div class="max-w-xl mx-auto">
                <div class="flex items-center gap-6 mb-6">
                    <img id="p-img" src="" class="w-16 h-16 rounded-2xl object-cover bg-zinc-200 shadow-sm">
                    <div class="flex-1 min-w-0">
                        <p id="p-title" class="text-sm font-bold truncate tracking-tight"></p>
                        <p id="p-artist" class="label-caps mt-1.5 truncate opacity-60"></p>
                    </div>
                    <div id="cassette-wrapper" class="cursor-pointer p-2" onclick="onlyAddFav()">
                        <svg id="heart-icon" class="cassette-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="2" y="4" width="20" height="16" rx="2.5"></rect>
                            <circle class="reel" cx="9" cy="12" r="1.2"></circle>
                            <circle class="reel" cx="15" cy="12" r="1.2"></circle>
                        </svg>
                    </div>
                </div>

                <div class="mb-6">
                    <div class="progress-container" onclick="seek(event)"><div id="progress-bar"></div></div>
                    <div class="flex justify-between">
                        <span id="time-current" class="time-label">0:00</span>
                        <span id="time-total" class="time-label">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <button onclick="toggleShuffle()" id="play-shuffle" class="opacity-20"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline></svg></button>
                    <div class="flex items-center gap-10">
                        <button onclick="prevTrack()" class="opacity-40"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button onclick="togglePlay()" class="w-16 h-16 rounded-full flex items-center justify-center" style="background: var(--btn-play); color: var(--btn-icon);"><div id="play-icon"></div></button>
                        <button onclick="nextTrack()" class="opacity-40"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    </div>
                    <div class="w-5"></div>
                </div>
            </div>
        </div>
    </footer>

    <audio id="main-audio"></audio>

    <script>
        // Bloquear altura para evitar saltos en móvil
        document.body.style.height = window.innerHeight + 'px';

        const APIS = ["https://pipedapi.kavin.rocks", "https://api.piped.private.coffee", "https://pipedapi.rivo.gg"];
        let apiIdx = 0, isShuffle = false, currentTrack = null;
        let favorites = JSON.parse(localStorage.getItem('zenFavs')) || [];
        const audio = document.getElementById('main-audio');

        async function fetchPiped(endpoint) {
            try {
                const response = await fetch(`${APIS[apiIdx]}${endpoint}`);
                if (!response.ok) throw new Error();
                return await response.json();
            } catch (err) {
                apiIdx = (apiIdx + 1) % APIS.length;
                return fetchPiped(endpoint);
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-btn-text').innerText = isDark ? 'LIGHT' : 'DARK';
            updatePlayIcon();
        }

        let searchTimer;
        function handleSearch() {
            clearTimeout(searchTimer);
            const q = document.getElementById('q').value;
            const resDiv = document.getElementById('resultados');
            if (!q) { resDiv.style.display = 'none'; return; }
            searchTimer = setTimeout(async () => {
                resDiv.style.display = 'block';
                resDiv.innerHTML = '<div class="p-6 text-center label-caps animate-pulse">...</div>';
                const data = await fetchPiped(`/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                resDiv.innerHTML = data.items.slice(0, 6).map(item => {
                    const id = item.url.split('=')[1];
                    return `<div onclick="selectTrack('${id}', '${item.title.replace(/'/g,"")}', '${item.uploaderName.replace(/'/g,"")}', '${item.thumbnail}')" class="flex items-center gap-4 p-4 border-b border-[var(--border)]"><img src="${item.thumbnail}" class="w-10 h-10 rounded-lg object-cover"><div class="flex-1 min-w-0"><p class="text-[12px] font-bold truncate">${item.title}</p><p class="label-caps opacity-50">${item.uploaderName}</p></div></div>`;
                }).join('');
            }, 400);
        }

        function selectTrack(id, title, artist, thumb) {
            document.getElementById('resultados').style.display = 'none';
            document.getElementById('q').value = '';
            document.getElementById('q').blur(); // Cierra teclado
            reproducir(id, title, artist, thumb);
        }

        async function reproducir(id, title, artist, thumb) {
            currentTrack = {id, title, artist, thumb};
            document.getElementById('player').classList.add('visible');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = thumb;
            updateFavBtn();
            try {
                const response = await fetch(`${APIS[apiIdx]}/streams/${id}`);
                const data = await response.json();
                const stream = data.audioStreams.find(s => s.format === 'M4A') || data.audioStreams[0];
                audio.src = stream.url;
                audio.play();
                updatePlayIcon();
            } catch (e) {
                apiIdx = (apiIdx + 1) % APIS.length;
                reproducir(id, title, artist, thumb);
            }
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updatePlayIcon(); }
        
        function updatePlayIcon() {
            const iconColor = getComputedStyle(document.body).getPropertyValue('--btn-icon').trim();
            document.getElementById('play-icon').innerHTML = audio.paused ? 
                `<svg width="26" height="26" viewBox="0 0 24 24" fill="${iconColor}"><path d="M8 5v14l11-7z"/></svg>` : 
                `<svg width="26" height="26" viewBox="0 0 24 24" fill="${iconColor}"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
        }

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration * 100) || 0;
            document.getElementById('progress-bar').style.width = perc + '%';
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            document.getElementById('time-total').innerText = formatTime(audio.duration);
        };

        function formatTime(s) { if (isNaN(s)) return "0:00"; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
        audio.onended = nextTrack;

        function updateFavsUI() {
            document.getElementById('fav-count').innerText = favorites.length;
            document.getElementById('favs-list').innerHTML = favorites.map(f => `
                <div class="flex items-center gap-5 p-4 bg-[var(--card)] border border-[var(--border)] rounded-2xl">
                    <img src="${f.thumb}" class="w-14 h-14 rounded-xl object-cover" onclick="reproducir('${f.id}','${f.title}','${f.artist}','${f.thumb}')">
                    <div class="flex-1 min-w-0" onclick="reproducir('${f.id}','${f.title}','${f.artist}','${f.thumb}')">
                        <p class="text-[13px] font-bold truncate">${f.title}</p>
                        <p class="label-caps opacity-50">${f.artist}</p>
                    </div>
                    <button onclick="removeFav('${f.id}')" class="opacity-20 p-2">×</button>
                </div>`).join('');
            localStorage.setItem('zenFavs', JSON.stringify(favorites));
        }

        function onlyAddFav() {
            if(!currentTrack || favorites.some(f => f.id === currentTrack.id) || favorites.length >= 30) return;
            favorites.push({...currentTrack});
            updateFavsUI(); updateFavBtn();
        }

        function removeFav(id) { favorites = favorites.filter(f => f.id !== id); updateFavsUI(); updateFavBtn(); }
        function updateFavBtn() {
            const icon = document.getElementById('heart-icon');
            const isFav = currentTrack && favorites.some(f => f.id === currentTrack.id);
            isFav ? icon.classList.add('cassette-filled') : icon.classList.remove('cassette-filled');
        }

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('play-shuffle').style.opacity = isShuffle ? "1" : "0.2"; }
        function nextTrack() {
            if (!favorites.length) return;
            let nIdx = isShuffle ? Math.floor(Math.random()*favorites.length) : (favorites.findIndex(f => f.id === currentTrack?.id)+1)%favorites.length;
            reproducir(favorites[nIdx].id, favorites[nIdx].title, favorites[nIdx].artist, favorites[nIdx].thumb);
        }
        function prevTrack() {
            if (!favorites.length) return;
            let pIdx = (favorites.findIndex(f => f.id === currentTrack?.id)-1+favorites.length)%favorites.length;
            reproducir(favorites[pIdx].id, favorites[pIdx].title, favorites[pIdx].artist, favorites[pIdx].thumb);
        }
        function zenStart() { if (favorites.length) { isShuffle = true; toggleShuffle(); nextTrack(); } }

        window.addEventListener('resize', () => {
            // Prevenir que el resize de la barra de direcciones mueva todo
            document.body.style.height = window.innerHeight + 'px';
        });

        updateFavsUI();
        updatePlayIcon();
    </script>
</body>
</html>
