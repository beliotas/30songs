<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>30 SONGS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f7f7f7; --text: #2a2a2a; --card: #ffffff; 
            --border: #e5e5e5; --accent: #2a2a2a; --player-bg: #ffffff;
            --btn-play: #2a2a2a; --btn-icon: #f7f7f7;
        }
        .dark-mode { 
            --bg: #161616; --text: #d1d1d1; --card: #1e1e1e; 
            --border: #2a2a2a; --accent: #d1d1d1; --player-bg: #1a1a1a;
            --btn-play: #d1d1d1; --btn-icon: #161616;
        }

        /* Estabilidad total en iOS */
        html, body { 
            position: fixed;
            overflow: hidden; 
            width: 100%;
            height: 100%; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
        }

        /* Contenedor con espacio reservado para el reproductor */
        #main-scroll-container { 
            height: 100%; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding-top: 80px; 
            padding-bottom: 320px; /* Espacio extra para que el reproductor no tape nada */
        }
        #main-scroll-container::-webkit-scrollbar { display: none; }

        nav { 
            position: fixed; top: 0; width: 100%; z-index: 100; 
            background: var(--bg); border-bottom: 1px solid var(--border); 
            padding-top: env(safe-area-inset-top);
        }

        .label-caps { font-size: 10px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; font-weight: 600; }
        
        .zen-input { 
            border: 1px solid var(--border); 
            background: transparent; 
            border-radius: 1rem; 
            outline: none; 
            color: var(--text);
            text-align: center;
            font-size: 16px; 
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
        }
        .zen-input::placeholder { font-size: 10px; opacity: 0.3; }
        
        #resultados { 
            position: absolute; top: 110%; left: 0; right: 0; 
            background: var(--card); border-radius: 16px; 
            max-height: 40vh; overflow-y: auto; 
            border: 1px solid var(--border); display: none; z-index: 110; 
        }

        .progress-container { width: 100%; background: var(--border); height: 2px; cursor: pointer; margin-bottom: 4px; }
        #progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.1s linear; }

        /* REPRODUCTOR SIEMPRE VISIBLE */
        #player { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            z-index: 100; 
            background: var(--player-bg); 
            border-top: 1px solid var(--border); 
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            display: block !important; /* Forzamos visualización */
        }

        .cassette-filled { fill: var(--accent) !important; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <span class="label-caps text-[var(--text)]">30 SONGS</span>
            <button onclick="toggleTheme()" id="theme-btn-text" class="label-caps opacity-50">DARK</button>
        </div>
        <div class="flex items-center gap-2">
            <span id="fav-count" class="label-caps font-bold text-[var(--text)]">0</span>
            <span class="label-caps">/ 30</span>
        </div>
    </nav>

    <div id="main-scroll-container">
        <main class="max-w-xl mx-auto w-full px-6">
            <div class="mb-4 relative">
                <input id="q" type="text" placeholder="BUSCAR MÚSICA" class="zen-input w-full py-4 px-7" oninput="handleSearch()" autocomplete="off">
                <div id="resultados"></div>
            </div>
            
            <div class="mb-10">
                <button onclick="zenStart()" class="w-full py-5 rounded-2xl bg-[var(--text)] text-[var(--bg)] font-bold text-[10px] tracking-[0.3em] uppercase active:scale-95 transition-transform">
                    START 30s MIX
                </button>
            </div>
            <div id="favs-list" class="space-y-3"></div>
        </main>
    </div>

    <!-- Reproductor fijo -->
    <footer id="player">
        <div class="p-6">
            <div class="max-w-xl mx-auto">
                <div class="flex items-center gap-4 mb-4">
                    <img id="p-img" src="https://via.placeholder.com/150" class="w-12 h-12 rounded-xl object-cover bg-zinc-100">
                    <div class="flex-1 min-w-0">
                        <p id="p-title" class="text-[13px] font-bold truncate tracking-tight">Selecciona una canción</p>
                        <p id="p-artist" class="label-caps mt-1 truncate opacity-60">Artista</p>
                    </div>
                    <button onclick="onlyAddFav()" class="p-2">
                        <svg id="heart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <circle cx="9" cy="12" r="1"></circle>
                            <circle cx="15" cy="12" r="1"></circle>
                        </svg>
                    </button>
                </div>

                <div class="mb-4">
                    <div class="progress-container" onclick="seek(event)"><div id="progress-bar"></div></div>
                    <div class="flex justify-between text-[9px] opacity-40 font-mono">
                        <span id="time-current">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <button onclick="toggleShuffle()" id="play-shuffle" class="opacity-20"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line></svg></button>
                    <div class="flex items-center gap-8">
                        <button onclick="prevTrack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                        <button onclick="togglePlay()" class="w-14 h-14 rounded-full flex items-center justify-center shadow-lg" style="background: var(--btn-play); color: var(--btn-icon);"><div id="play-icon"></div></button>
                        <button onclick="nextTrack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                    </div>
                    <div class="w-4"></div>
                </div>
            </div>
        </div>
    </footer>

    <audio id="main-audio"></audio>

    <script>
        // Bloqueo de scroll y altura para Safari
        const fixHeight = () => { document.body.style.height = window.innerHeight + 'px'; };
        window.addEventListener('resize', fixHeight);
        fixHeight();

        const APIS = ["https://pipedapi.kavin.rocks", "https://api.piped.private.coffee", "https://pipedapi.rivo.gg"];
        let apiIdx = 0, isShuffle = false, currentTrack = null, favorites = JSON.parse(localStorage.getItem('zenFavs')) || [];
        const audio = document.getElementById('main-audio');

        async function fetchPiped(endpoint) {
            try {
                const r = await fetch(`${APIS[apiIdx]}${endpoint}`);
                return r.ok ? await r.json() : throwErr();
            } catch { apiIdx = (apiIdx + 1) % APIS.length; return fetchPiped(endpoint); }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-btn-text').innerText = isDark ? 'LIGHT' : 'DARK';
            updatePlayIcon();
        }

        let searchTimer;
        function handleSearch() {
            clearTimeout(searchTimer);
            const q = document.getElementById('q').value;
            const resDiv = document.getElementById('resultados');
            if (!q) { resDiv.style.display = 'none'; return; }
            searchTimer = setTimeout(async () => {
                resDiv.style.display = 'block';
                resDiv.innerHTML = '<div class="p-6 text-center label-caps">Buscando...</div>';
                const data = await fetchPiped(`/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                resDiv.innerHTML = data.items.slice(0, 6).map(item => {
                    const id = item.url.split('=')[1];
                    return `<div onclick="selectTrack('${id}', '${item.title.replace(/'/g,"")}', '${item.uploaderName.replace(/'/g,"")}', '${item.thumbnail}')" class="flex items-center gap-4 p-4 border-b border-[var(--border)]"><img src="${item.thumbnail}" class="w-10 h-10 rounded-lg object-cover"><div class="flex-1 min-w-0"><p class="text-[12px] font-bold truncate">${item.title}</p><p class="label-caps opacity-50">${item.uploaderName}</p></div></div>`;
                }).join('');
            }, 500);
        }

        function selectTrack(id, title, artist, thumb) {
            document.getElementById('resultados').style.display = 'none';
            document.getElementById('q').value = '';
            document.getElementById('q').blur();
            reproducir(id, title, artist, thumb);
        }

        async function reproducir(id, title, artist, thumb) {
            currentTrack = {id, title, artist, thumb};
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-artist').innerText = artist;
            document.getElementById('p-img').src = thumb;
            updateFavBtn();
            try {
                const data = await fetchPiped(`/streams/${id}`);
                const stream = data.audioStreams.find(s => s.format === 'M4A') || data.audioStreams[0];
                audio.src = stream.url;
                audio.play();
                updatePlayIcon();
            } catch (e) { console.error("Error de carga"); }
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updatePlayIcon(); }
        function updatePlayIcon() {
            const color = getComputedStyle(document.body).getPropertyValue('--btn-icon').trim();
            document.getElementById('play-icon').innerHTML = audio.paused ? 
                `<svg width="24" height="24" viewBox="0 0 24 24" fill="${color}"><path d="M8 5v14l11-7z"/></svg>` : 
                `<svg width="24" height="24" viewBox="0 0 24 24" fill="${color}"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
        }

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration * 100) || 0;
            document.getElementById('progress-bar').style.width = perc + '%';
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            document.getElementById('time-total').innerText = formatTime(audio.duration);
        };

        function formatTime(s) { if (isNaN(s)) return "0:00"; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
        audio.onended = nextTrack;

        function updateFavsUI() {
            document.getElementById('fav-count').innerText = favorites.length;
            document.getElementById('favs-list').innerHTML = favorites.map(f => `
                <div class="flex items-center gap-4 p-3 bg-[var(--card)] border border-[var(--border)] rounded-xl">
                    <img src="${f.thumb}" class="w-12 h-12 rounded-lg object-cover" onclick="reproducir('${f.id}','${f.title}','${f.artist}','${f.thumb}')">
                    <div class="flex-1 min-w-0" onclick="reproducir('${f.id}','${f.title}','${f.artist}','${f.thumb}')">
                        <p class="text-[12px] font-bold truncate">${f.title}</p>
                        <p class="label-caps opacity-50">${f.artist}</p>
                    </div>
                    <button onclick="removeFav('${f.id}')" class="opacity-20 px-2">×</button>
                </div>`).join('');
            localStorage.setItem('zenFavs', JSON.stringify(favorites));
        }

        function onlyAddFav() {
            if(!currentTrack || favorites.some(f => f.id === currentTrack.id) || favorites.length >= 30) return;
            favorites.push({...currentTrack});
            updateFavsUI(); updateFavBtn();
        }

        function removeFav(id) { favorites = favorites.filter(f => f.id !== id); updateFavsUI(); updateFavBtn(); }
        function updateFavBtn() {
            const icon = document.getElementById('heart-icon');
            const isFav = currentTrack && favorites.some(f => f.id === currentTrack.id);
            isFav ? icon.classList.add('cassette-filled') : icon.classList.remove('cassette-filled');
        }

        function toggleShuffle() { isShuffle = !isShuffle; document.getElementById('play-shuffle').style.opacity = isShuffle ? "1" : "0.2"; }
        function nextTrack() {
            if (!favorites.length) return;
            let nIdx = isShuffle ? Math.floor(Math.random()*favorites.length) : (favorites.findIndex(f => f.id === currentTrack?.id)+1)%favorites.length;
            reproducir(favorites[nIdx].id, favorites[nIdx].title, favorites[nIdx].artist, favorites[nIdx].thumb);
        }
        function prevTrack() {
            if (!favorites.length) return;
            let pIdx = (favorites.findIndex(f => f.id === currentTrack?.id)-1+favorites.length)%favorites.length;
            reproducir(favorites[pIdx].id, favorites[pIdx].title, favorites[pIdx].artist, favorites[pIdx].thumb);
        }
        function zenStart() { if (favorites.length) { isShuffle = true; toggleShuffle(); nextTrack(); } }

        updateFavsUI();
        updatePlayIcon();
    </script>
</body>
</html>
