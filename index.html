<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>30 SONGS - ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #000000; --text: #ffffff; --accent: #1DB954; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
        .safe-area { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input { background: #121212 !important; border: 1px solid #333 !important; color: white !important; }
        #results-layer { position: absolute; top: 140px; left: 20px; right: 20px; z-index: 1000; display: none; }
    </style>
</head>
<body class="safe-area flex flex-col p-5">

    <header class="flex justify-between items-center mb-8">
        <h1 class="text-xs font-black tracking-widest opacity-50">ZEN PLAYER</h1>
        <div id="count" class="text-xs font-bold text-[var(--accent)]">0 / 30</div>
    </header>

    <div class="relative mb-6">
        <input id="q" type="text" placeholder="Buscar artista o canción..." class="w-full p-4 rounded-2xl outline-none" oninput="search()">
        <div id="results-layer" class="glass rounded-2xl overflow-hidden shadow-2xl"></div>
    </div>

    <button onclick="forceStart()" class="w-full py-4 rounded-2xl bg-white text-black font-bold text-[10px] tracking-widest uppercase mb-10 active:scale-95 transition-transform">
        ACTIVAR AUDIO & MIX
    </button>

    <div id="list" class="flex-1 overflow-y-auto space-y-3 pb-40">
        <!-- Canciones favoritas aquí -->
    </div>

    <footer id="player" class="fixed bottom-0 left-0 right-0 p-6 glass rounded-t-3xl translate-y-full transition-transform duration-500">
        <div class="max-w-md mx-auto">
            <div class="flex items-center gap-4 mb-6">
                <img id="p-img" class="w-16 h-16 rounded-lg shadow-lg">
                <div class="flex-1 min-w-0">
                    <p id="p-title" class="font-bold truncate text-sm"></p>
                    <p id="p-artist" class="text-xs opacity-50 truncate"></p>
                </div>
                <button id="p-fav" onclick="toggleFav()" class="text-2xl">♡</button>
            </div>
            
            <div class="h-1 bg-zinc-800 rounded-full mb-6 overflow-hidden" onclick="seek(event)">
                <div id="p-bar" class="h-full bg-white w-0"></div>
            </div>

            <div class="flex justify-around items-center">
                <button onclick="prev()" class="p-2"><svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button onclick="togglePlay()" class="w-16 h-16 bg-white rounded-full flex items-center justify-center active:scale-90 transition-transform">
                    <div id="p-icon" class="text-black">
                        <svg width="30" height="30" fill="black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </button>
                <button onclick="next()" class="p-2"><svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
            <button onclick="retry()" class="w-full text-[9px] opacity-30 mt-4 tracking-tighter">¿NO CARGA? REINTENTAR CONEXIÓN</button>
        </div>
    </footer>

    <audio id="audio" playsinline crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio');
        let favs = JSON.parse(localStorage.getItem('zen_30')) || [];
        let current = null;
        // Lista de instancias actualizadas 2024
        const INSTANCES = [
            "https://pipedapi.kavin.rocks",
            "https://api.piped.private.coffee",
            "https://pipedapi.ultra-prive.org",
            "https://pipedapi.syncit.me"
        ];
        let instIdx = 0;

        async function call(ep) {
            for(let i=0; i<INSTANCES.length; i++) {
                try {
                    const r = await fetch(INSTANCES[instIdx] + ep);
                    if(r.ok) return await r.json();
                } catch(e) { instIdx = (instIdx + 1) % INSTANCES.length; }
            }
        }

        function search() {
            const q = document.getElementById('q').value;
            const res = document.getElementById('results-layer');
            if(q.length < 3) { res.style.display = 'none'; return; }

            clearTimeout(window.t);
            window.t = setTimeout(async () => {
                res.style.display = 'block';
                res.innerHTML = '<div class="p-4 text-center text-xs opacity-50">Buscando...</div>';
                const data = await call(`/search?q=${encodeURIComponent(q)}&filter=music_songs`);
                if(!data) return;
                res.innerHTML = data.items.slice(0,5).map(i => `
                    <div onclick="playNow('${i.url.split('=')[1]}','${i.title.replace(/'/g,"")}','${i.uploaderName.replace(/'/g,"")}','${i.thumbnail}')" class="p-4 flex items-center gap-3 border-b border-white/5 active:bg-white/10">
                        <img src="${i.thumbnail}" class="w-10 h-10 rounded object-cover">
                        <div class="min-w-0 flex-1"><p class="text-xs font-bold truncate">${i.title}</p></div>
                    </div>
                `).join('');
            }, 600);
        }

        async function playNow(id, t, a, img) {
            document.getElementById('results-layer').style.display = 'none';
            document.getElementById('q').value = '';
            current = {id, t, a, img};
            
            const p = document.getElementById('player');
            p.classList.remove('translate-y-full');
            document.getElementById('p-title').innerText = t;
            document.getElementById('p-artist').innerText = a;
            document.getElementById('p-img').src = img;
            
            updateFavIcon();

            try {
                const data = await call(`/streams/${id}`);
                const s = data.audioStreams.find(x => x.format === 'M4A') || data.audioStreams[0];
                audio.src = s.url;
                audio.load();
                await audio.play();
                updateUI();
                
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: t, artist: a, artwork: [{ src: img, sizes: '512x512', type: 'image/jpeg' }]
                    });
                }
            } catch(e) { 
                console.error("Block by Brave/iOS");
            }
        }

        function forceStart() {
            // Truco maestro: reproducir un silencio para engañar a Brave
            audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFMmZtdCAQAAAAAQABAIAAgAAAAIAAAABhZGF0YQAAAAA=";
            audio.play().then(() => {
                if(favs.length > 0) next();
            });
        }

        function retry() { if(current) playNow(current.id, current.t, current.a, current.img); }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); updateUI(); }
        
        function updateUI() {
            const icon = document.getElementById('p-icon');
            icon.innerHTML = audio.paused ? 
                `<svg width="30" height="30" fill="black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>` : 
                `<svg width="30" height="30" fill="black" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
        }

        audio.ontimeupdate = () => {
            document.getElementById('p-bar').style.width = (audio.currentTime / audio.duration * 100) + '%';
        };

        function toggleFav() {
            if(!current) return;
            const idx = favs.findIndex(x => x.id === current.id);
            if(idx > -1) favs.splice(idx, 1);
            else if(favs.length < 30) favs.push(current);
            localStorage.setItem('zen_30', JSON.stringify(favs));
            renderFavs();
            updateFavIcon();
        }

        function renderFavs() {
            document.getElementById('count').innerText = `${favs.length} / 30`;
            document.getElementById('list').innerHTML = favs.map(f => `
                <div class="flex items-center gap-4 p-3 glass rounded-2xl active:scale-95 transition-transform" onclick="playNow('${f.id}','${f.t}','${f.a}','${f.img}')">
                    <img src="${f.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1 min-w-0"><p class="text-[13px] font-bold truncate">${f.t}</p><p class="text-[10px] opacity-40">${f.a}</p></div>
                </div>
            `).join('');
        }

        function updateFavIcon() {
            const isF = favs.some(x => x.id === current?.id);
            document.getElementById('p-fav').innerText = isF ? "❤️" : "♡";
        }

        function next() {
            if(!favs.length) return;
            const i = (favs.findIndex(x => x.id === current?.id) + 1) % favs.length;
            const n = favs[i];
            playNow(n.id, n.t, n.a, n.img);
        }

        function prev() {
            if(!favs.length) return;
            const i = (favs.findIndex(x => x.id === current?.id) - 1 + favs.length) % favs.length;
            const p = favs[i];
            playNow(p.id, p.t, p.a, p.img);
        }

        audio.onended = next;
        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }

        renderFavs();
    </script>
</body>
</html>
